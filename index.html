<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Wash — Сьогодні</title>
<link rel="icon" type="image/png" href="https://elrmeekxaxcyxdyzqtzg.supabase.co/storage/v1/object/public/location-logos/b1629a66-08aa-48ab-b6c8-ff596732d50e/logo.jpg">
<link rel="apple-touch-icon" href="https://elrmeekxaxcyxdyzqtzg.supabase.co/storage/v1/object/public/location-logos/b1629a66-08aa-48ab-b6c8-ff596732d50e/logo.jpg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="One Wash">
<meta name="theme-color" content="#0A1E30">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="shell">

  <!-- ФОРМА ЛОГІНУ (показується, якщо мийник не залогінений) -->
  <div id="login-view" style="display:none;">
    <div class="login-box">
      <h1>One Wash</h1>
      <p>Вхід для мийників</p>
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="roman@test.com" required>
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <input type="password" id="login-password" required>
        </div>
        <button type="submit" class="submit-btn">Увійти</button>
        <div class="login-error" id="login-error"></div>
      </form>
    </div>
  </div>

  <!-- ОСНОВНИЙ ЕКРАН -->
  <div id="app-view" style="display:none;">
    <div class="topbar">
      <div class="topbar-row">
        <div class="who">
          <div class="avatar" id="staff-initials">--</div>
          <div><b id="staff-name">—</b><span>Мийник · One Wash</span></div>
        </div>
        <button class="logout-btn" id="logout-btn">Вийти</button>
      </div>
    </div>

    <div class="content">
      <div class="page-h">Сьогодні</div>
      <div class="page-sub" id="page-sub">Завантаження...</div>

      <div id="push-banner" class="push" style="display:none;align-items:center;justify-content:space-between;cursor:pointer;">
        <div style="display:flex;gap:10px;align-items:flex-start;">
          <div class="ic">🔔</div>
          <div><b id="push-banner-title">Увімкнути сповіщення</b><br><span id="push-banner-sub">Нагадування про записи на завтра, за 2 год і за 30 хв</span></div>
        </div>
        <button class="btn btn-sm" id="push-toggle-btn" style="background:var(--cyan-500);border-color:var(--cyan-500);color:#04202F;font-weight:600;white-space:nowrap;">Увімкнути</button>
      </div>

      <div id="jobs-list"></div>
    </div>
  </div>

  <!-- НИЖНЄ МЕНЮ (однакове на всіх сторінках) -->
  <div class="bottom-nav">
    <a class="bn-item active" href="index.html"><span class="ic">◧</span>Сьогодні</a>
    <a class="bn-item" href="checkin.html"><span class="ic">＋</span>Реєстрація</a>
    <a class="bn-item" href="calendar.html"><span class="ic">▦</span>Календар</a>
    <a class="bn-item" href="schedule.html"><span class="ic">📅</span>Мій графік</a>
  </div>

</div>

<script type="module">
  import { supabase, initPage, wireLoginForm, logout, formatTime, subscribeToTable, getPushSubscriptionStatus, enablePushNotifications, disablePushNotifications, isIos, isStandaloneApp } from './app.js';

  wireLoginForm();
  document.getElementById('logout-btn').addEventListener('click', logout);

  let currentStaffForPush = null;

  initPage(async (staff) => {
    currentStaffForPush = staff;
    await loadToday(staff);
    await refreshPushBanner();

    // Realtime: якщо адмін або сайт мийки створить/змінить запис цього мийника —
    // список оновиться сам, без перезавантаження сторінки
    subscribeToTable('bookings-today-' + staff.id, 'bookings', `staff_id=eq.${staff.id}`, () => {
      loadToday(staff);
    });
  });

  async function refreshPushBanner() {
    const banner = document.getElementById('push-banner');
    const title = document.getElementById('push-banner-title');
    const sub = document.getElementById('push-banner-sub');
    const btn = document.getElementById('push-toggle-btn');

    const status = await getPushSubscriptionStatus();

    if (status === 'unsupported') {
      banner.style.display = 'none';
      return;
    }

    banner.style.display = 'flex';

    if (status === 'subscribed') {
      title.textContent = 'Сповіщення увімкнено';
      sub.textContent = 'Ви отримуватимете нагадування про записи';
      btn.textContent = 'Вимкнути';
    } else if (isIos() && !isStandaloneApp()) {
      title.textContent = 'Увімкнути сповіщення';
      sub.textContent = 'Спочатку додайте застосунок на головний екран (Поділитися → На головний екран)';
      btn.textContent = 'Увімкнути';
    } else {
      title.textContent = 'Увімкнути сповіщення';
      sub.textContent = 'Нагадування про записи на завтра, за 2 год і за 30 хв';
      btn.textContent = 'Увімкнути';
    }
  }

  document.getElementById('push-toggle-btn').addEventListener('click', async () => {
    const btn = document.getElementById('push-toggle-btn');
    const status = await getPushSubscriptionStatus();

    if (status === 'subscribed') {
      await disablePushNotifications(currentStaffForPush.id);
      await refreshPushBanner();
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Зачекайте...';
    try {
      await enablePushNotifications(currentStaffForPush.id);
      await refreshPushBanner();
    } catch (err) {
      alert(err.message || 'Не вдалося увімкнути сповіщення');
    } finally {
      btn.disabled = false;
    }
  });

  async function loadToday(staff) {
    const jobsList = document.getElementById('jobs-list');
    const pageSub = document.getElementById('page-sub');

    const startOfDay = new Date(); startOfDay.setHours(0, 0, 0, 0);
    const endOfDay = new Date(); endOfDay.setHours(23, 59, 59, 999);
    const todayStr = startOfDay.toISOString().slice(0, 10);

    // чи сьогодні робочий день саме для цього мийника (за замовчуванням — так, якщо не задано)
    const { data: scheduleRow } = await supabase
      .from('staff_schedule_dates')
      .select('is_working')
      .eq('staff_id', staff.id)
      .eq('work_date', todayStr)
      .maybeSingle();
    const isWorkingToday = scheduleRow ? scheduleRow.is_working : true;

    let query = supabase
      .from('bookings')
      .select('*, cars(*), clients(*), wash_types(*)')
      .eq('location_id', staff.location_id)
      .gte('scheduled_at', startOfDay.toISOString())
      .lte('scheduled_at', endOfDay.toISOString())
      .in('status', ['pending', 'confirmed', 'in_progress'])
      .order('scheduled_at');

    // у робочий день бачимо і свої, і непризначені записи мийки; у вихідний — тільки вже свої
    query = isWorkingToday
      ? query.or(`staff_id.eq.${staff.id},staff_id.is.null`)
      : query.eq('staff_id', staff.id);

    const { data: bookings, error } = await query;

    if (error) {
      pageSub.textContent = 'Помилка завантаження записів';
      console.error(error);
      return;
    }

    if (bookings.length === 0) {
      pageSub.textContent = 'На сьогодні записів немає';
      jobsList.innerHTML = '<div class="empty-state">Записів на сьогодні немає</div>';
      return;
    }

    pageSub.textContent = `У вас ${bookings.length} записів сьогодні`;
    jobsList.innerHTML = '';
    bookings.forEach(b => jobsList.appendChild(renderJobCard(b, staff)));
  }

  function renderJobCard(b, staff) {
    const card = document.createElement('div');
    card.className = 'job-card';
    card.id = 'job-' + b.id;

    const statusLabel = { pending: 'Не підтверджено', confirmed: 'Заброньовано', in_progress: 'В процесі' }[b.status] || b.status;
    const pillClass = { pending: 'pending', confirmed: 'confirmed', in_progress: 'progress' }[b.status] || '';
    const carLabel = b.cars ? `${b.cars.brand_model || 'Авто'} · ${b.cars.plate || '—'}` : 'Авто не вказано';
    const clientLabel = b.clients?.full_name || b.clients?.phone || 'Клієнт не вказаний';
    const washLabel = b.wash_types?.name || 'Послуга не вказана';
    const unassigned = !b.staff_id;

    let actions = '';
    if (unassigned) {
      actions = `<button class="primary btn-take" data-id="${b.id}">Взяти в роботу</button>`;
    } else if (b.status === 'pending') {
      actions = `<button class="btn-confirm" data-id="${b.id}">Підтвердити</button>
                 <button class="danger btn-noshow" data-id="${b.id}">Авто не приїхало</button>`;
    } else if (b.status === 'confirmed') {
      actions = `<a href="checkin.html?booking=${b.id}" class="primary" style="flex:1;text-align:center;padding:8px 0;border-radius:8px;font-size:12.5px;font-weight:600;background:var(--cyan-500);color:#04202F;">Авто приїхало</a>
                 <button class="danger btn-noshow" data-id="${b.id}">Авто не приїхало</button>`;
    } else if (b.status === 'in_progress') {
      actions = `<button class="primary btn-complete" data-id="${b.id}">Завершити мийку</button>`;
    }

    card.innerHTML = `
      <div class="job-top"><span class="job-time">${formatTime(b.scheduled_at)}</span><span class="pill ${pillClass}">${unassigned ? 'Вільний запис' : statusLabel}</span></div>
      <p class="job-car"><b>Послуга:</b> ${washLabel}</p>
      <div class="job-meta"><b>Клієнт:</b> ${clientLabel}</div>
      <div class="job-meta"><b>Авто:</b> ${carLabel}</div>
      <div class="job-actions">${actions}</div>
    `;
    return card;
  }

  // Обробка кліків на кнопках усередині карток (делегування подій)
  document.getElementById('jobs-list').addEventListener('click', async (e) => {
    const id = e.target.dataset.id;
    if (!id) return;
    const card = document.getElementById('job-' + id);

    if (e.target.classList.contains('btn-take')) {
      const { error } = await supabase.from('bookings').update({ staff_id: currentStaffForPush.id }).eq('id', id);
      if (error) { alert('Не вдалося взяти запис у роботу (можливо, його вже взяв інший мийник)'); }
      await loadToday(currentStaffForPush);
      return;
    }

    if (e.target.classList.contains('btn-noshow')) {
      await supabase.from('bookings').update({ status: 'no_show' }).eq('id', id);
      card.classList.add('fading');
      setTimeout(() => card.remove(), 300);
    }
    if (e.target.classList.contains('btn-complete')) {
      await supabase.from('bookings').update({
        status: 'done',
        completed_at: new Date().toISOString()
      }).eq('id', id);
      card.classList.add('fading');
      setTimeout(() => card.remove(), 300);
    }
    if (e.target.classList.contains('btn-confirm')) {
      await supabase.from('bookings').update({ status: 'confirmed' }).eq('id', id);
      location.reload();
    }
  });
</script>
</body>
</html>
