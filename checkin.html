<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Wash — Реєстрація авто</title>
<link rel="icon" type="image/png" href="icon-v2-192.png">
<link rel="apple-touch-icon" href="icon-v2-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="One Wash">
<meta name="theme-color" content="#0A1E30">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="shell">

  <div id="login-view" style="display:none;">
    <div class="login-box">
      <h1>One Wash</h1>
      <p>Вхід для мийників</p>
      <form id="login-form">
        <div class="form-group"><label>Email</label><input type="email" id="login-email" required></div>
        <div class="form-group"><label>Пароль</label><input type="password" id="login-password" required></div>
        <button type="submit" class="submit-btn">Увійти</button>
        <div class="login-error" id="login-error"></div>
      </form>
    </div>
  </div>

  <div id="app-view" style="display:none;">
    <div class="topbar">
      <div class="topbar-row">
        <div class="who">
          <div class="avatar" id="staff-initials">--</div>
          <div><b id="staff-name">—</b><span>Мийник · One Wash</span></div>
        </div>
        <button class="logout-btn" id="logout-btn">Вийти</button>
      </div>
    </div>

    <div class="content">
      <div class="page-h" id="page-h">Авто приїхало</div>
      <div class="page-sub" id="page-sub">Заповніть дані перед миттям</div>

      <form id="checkin-form">
        <div class="form-row">
          <div class="form-group"><label>Номерний знак</label><input type="text" id="plate" placeholder="ТН 1234 АА" required></div>
          <div class="form-group"><label>Телефон клієнта</label><input type="tel" id="phone" placeholder="+380671112233" required></div>
        </div>
        <div class="form-group" id="discount-info" style="display:none;background:var(--green-100);border-radius:8px;padding:9px 12px;margin-bottom:6px;">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12.5px;color:var(--green-600);">
            <input type="checkbox" id="apply-discount" checked style="width:16px;height:16px;">
            У клієнта постійна знижка <b id="discount-percent">0</b>% — застосувати
          </label>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Марка</label><select id="brand-select"></select></div>
          <div class="form-group"><label>Колір</label><input type="text" id="color" placeholder="Білий"></div>
        </div>
        <div class="form-row">
          <div class="form-group" id="brand-other-wrap" style="display:none;"><label>Введіть марку</label><input type="text" id="brand-other"></div>
          <div class="form-group"><label>Модель</label><select id="model-select"></select></div>
        </div>
        <div class="form-row">
          <div class="form-group" id="model-other-wrap" style="display:none;"><label>Введіть модель</label><input type="text" id="model-other"></div>
        </div>

        <div class="form-group">
          <label>Тип авто</label>
          <div class="vtype-grid" id="vtype-box"></div>
        </div>

        <div class="form-group">
          <label>Тип послуги</label>
          <div class="service-opts" id="washtype-box"></div>
        </div>

        <div class="section-label">Додаткові послуги</div>
        <div class="job-card" id="extras-box" style="padding:2px 14px;"></div>

        <div class="total-box" style="align-items:center;">
        <div class="t">Загальна вартість, грн<br><span style="font-size:10.5px;color:#9FC3DC;">можна змінити вручну (складне забруднення тощо)</span></div>
        <input type="text" id="total-price" value="0" style="width:110px;text-align:right;font-size:18px;font-weight:600;background:transparent;border:none;color:#fff;border-bottom:1.5px solid rgba(255,255,255,0.3);">
      </div>

        <div class="form-group"><label>Нотатки</label><textarea id="notes" placeholder="Плями на сидінні, подряпина на бампері..."></textarea></div>

        <div class="section-label">Фото авто</div>
        <div class="photo-row">
          <div class="photo-slot">
            <label>Перед <span class="req">обов'язково</span></label>
            <input type="file" id="photo-front" accept="image/*" capture="environment" required>
            <img class="preview" id="preview-front">
          </div>
          <div class="photo-slot">
            <label>Зад <span class="opt">за бажанням</span></label>
            <input type="file" id="photo-back" accept="image/*" capture="environment">
            <img class="preview" id="preview-back">
          </div>
          <div class="photo-slot">
            <label>Ліво <span class="opt">за бажанням</span></label>
            <input type="file" id="photo-left" accept="image/*" capture="environment">
            <img class="preview" id="preview-left">
          </div>
          <div class="photo-slot">
            <label>Право <span class="opt">за бажанням</span></label>
            <input type="file" id="photo-right" accept="image/*" capture="environment">
            <img class="preview" id="preview-right">
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">Зареєструвати та почати мийку</button>
      </form>
    </div>
  </div>

  <div class="bottom-nav">
    <a class="bn-item" href="index.html"><span class="ic">◧</span>Сьогодні</a>
    <a class="bn-item active" href="checkin.html"><span class="ic">＋</span>Реєстрація</a>
    <a class="bn-item" href="calendar.html"><span class="ic">▦</span>Календар</a>
    <a class="bn-item" href="schedule.html"><span class="ic">📅</span>Мій графік</a>
  </div>

</div>

<script type="module">
  import { supabase, initPage, wireLoginForm, logout } from './app.js';

  wireLoginForm();
  document.getElementById('logout-btn').addEventListener('click', logout);

  let currentStaff = null;
  let vehicleTypes = [], washTypes = [], washPrices = [], extraServices = [];
  let currentClientDiscount = 0;

  // Популярні марки та моделі авто — з опцією "Інша", якщо потрібної немає в списку
  const CAR_BRANDS = {
    'Toyota': ['Camry', 'Corolla', 'RAV4', 'Land Cruiser', 'Yaris'],
    'Volkswagen': ['Golf', 'Passat', 'Tiguan', 'Polo', 'Jetta'],
    'BMW': ['3 Series', '5 Series', 'X5', 'X3', '7 Series'],
    'Mercedes-Benz': ['C-Class', 'E-Class', 'GLE', 'S-Class', 'A-Class'],
    'Audi': ['A4', 'A6', 'Q5', 'Q7', 'A3'],
    'Skoda': ['Octavia', 'Superb', 'Kodiaq', 'Fabia', 'Karoq'],
    'Renault': ['Duster', 'Megane', 'Logan', 'Kadjar', 'Clio'],
    'Hyundai': ['Tucson', 'Elantra', 'Santa Fe', 'i30', 'Sonata'],
    'Kia': ['Sportage', 'Rio', 'Sorento', 'Ceed', 'Optima'],
    'Nissan': ['Qashqai', 'X-Trail', 'Juke', 'Leaf', 'Almera'],
    'Ford': ['Focus', 'Fusion', 'Kuga', 'Explorer', 'Fiesta'],
    'Opel': ['Astra', 'Insignia', 'Corsa', 'Mokka', 'Vectra'],
    'Peugeot': ['308', '3008', '508', '2008', '208'],
    'Chevrolet': ['Aveo', 'Cruze', 'Lacetti', 'Captiva', 'Niva'],
    'Honda': ['Civic', 'CR-V', 'Accord', 'HR-V', 'Pilot'],
    'Mazda': ['3', '6', 'CX-5', 'CX-3', 'CX-9'],
    'Mitsubishi': ['Outlander', 'ASX', 'Lancer', 'Pajero', 'Eclipse Cross'],
    'Volvo': ['XC60', 'XC90', 'S60', 'V40', 'XC40'],
    'Lexus': ['RX', 'NX', 'ES', 'GX', 'LX'],
    'Land Rover': ['Range Rover', 'Discovery', 'Defender', 'Evoque'],
    'Jeep': ['Grand Cherokee', 'Compass', 'Wrangler', 'Renegade'],
    'Subaru': ['Forester', 'Outback', 'Impreza', 'XV'],
    'Fiat': ['Tipo', '500', 'Panda', 'Doblo'],
    'Citroen': ['C4', 'C3', 'Berlingo', 'C5 Aircross'],
    'Mini': ['Cooper', 'Countryman', 'Clubman'],
    'Porsche': ['Cayenne', 'Macan', 'Panamera', '911'],
    'Jaguar': ['XF', 'XE', 'F-Pace', 'E-Pace'],
    'Suzuki': ['Vitara', 'SX4', 'Swift', 'Jimny'],
    'Dacia': ['Duster', 'Logan', 'Sandero'],
    'Chery': ['Tiggo 7', 'Tiggo 4', 'Tiggo 8'],
    'Geely': ['Coolray', 'Atlas', 'Emgrand']
  };

  function fillModelsFor(brand) {
    const modelSelect = document.getElementById('model-select');
    const models = CAR_BRANDS[brand] || [];
    modelSelect.innerHTML = models.map(m => `<option value="${m}">${m}</option>`).join('')
      + '<option value="__other__">Інша модель…</option>';
    document.getElementById('model-other-wrap').style.display = 'none';
  }

  function initBrandModelSelects() {
    const brandSelect = document.getElementById('brand-select');
    brandSelect.innerHTML = Object.keys(CAR_BRANDS).sort().map(b => `<option value="${b}">${b}</option>`).join('')
      + '<option value="__other__">Інша марка…</option>';
    fillModelsFor(brandSelect.value);

    brandSelect.addEventListener('change', () => {
      document.getElementById('brand-other-wrap').style.display = brandSelect.value === '__other__' ? 'block' : 'none';
      if (brandSelect.value !== '__other__') fillModelsFor(brandSelect.value);
      else {
        document.getElementById('model-select').innerHTML = '<option value="__other__">Інша модель…</option>';
        document.getElementById('model-other-wrap').style.display = 'block';
      }
    });
    document.getElementById('model-select').addEventListener('change', () => {
      document.getElementById('model-other-wrap').style.display = document.getElementById('model-select').value === '__other__' ? 'block' : 'none';
    });
  }

  function getBrandModelValue() {
    const brandSelect = document.getElementById('brand-select');
    const modelSelect = document.getElementById('model-select');
    const brand = brandSelect.value === '__other__' ? document.getElementById('brand-other').value.trim() : brandSelect.value;
    const model = modelSelect.value === '__other__' ? document.getElementById('model-other').value.trim() : modelSelect.value;
    return [brand, model].filter(Boolean).join(' ');
  }

  // Найкраще співставлення для випадку, коли авто вже прив'язане до існуючого запису
  function setBrandModelFromString(fullText) {
    if (!fullText) return;
    const brands = Object.keys(CAR_BRANDS).sort((a, b) => b.length - a.length);
    const match = brands.find(b => fullText === b || fullText.startsWith(b + ' '));
    if (match) {
      document.getElementById('brand-select').value = match;
      document.getElementById('brand-other-wrap').style.display = 'none';
      fillModelsFor(match);
      const model = fullText.slice(match.length).trim();
      const modelSelect = document.getElementById('model-select');
      const hasModel = [...modelSelect.options].some(o => o.value === model);
      if (model && hasModel) {
        modelSelect.value = model;
      } else if (model) {
        modelSelect.value = '__other__';
        document.getElementById('model-other-wrap').style.display = 'block';
        document.getElementById('model-other').value = model;
      }
    } else {
      document.getElementById('brand-select').value = '__other__';
      document.getElementById('brand-other-wrap').style.display = 'block';
      document.getElementById('brand-other').value = fullText;
    }
  }

  // Якщо в посиланні є ?booking=ID — значить, мийник прийшов сюди з екрана
  // "Сьогодні" по кнопці "Авто приїхало" для вже існуючого запису.
  // Якщо параметра немає — це нова реєстрація авто "з вулиці" (без попереднього запису).
  const existingBookingId = new URLSearchParams(window.location.search).get('booking');
  let existingBooking = null;

  initPage(async (staff) => {
    currentStaff = staff;
    await loadOptions();
    if (existingBookingId) {
      await loadExistingBooking();
    }
  });

  async function loadOptions() {
    const [{ data: vt }, { data: wt }, { data: wp }, { data: ex }] = await Promise.all([
      supabase.from('vehicle_types').select('*').eq('location_id', currentStaff.location_id).order('sort_order'),
      supabase.from('wash_types').select('*').eq('location_id', currentStaff.location_id).order('sort_order'),
      supabase.from('wash_prices').select('*'),
      supabase.from('extra_services').select('*').eq('location_id', currentStaff.location_id).eq('is_active', true)
    ]);

    vehicleTypes = vt || [];
    washTypes = wt || [];
    washPrices = wp || [];
    extraServices = ex || [];

    renderChips('vtype-box', vehicleTypes, 'vtype-chip');
    renderChips('washtype-box', washTypes, 'service-chip');
    renderExtras();
    initBrandModelSelects();
    updateTotal();
  }

  // Підтягує дані вже існуючого запису (клієнт, авто, тип послуги) і заповнює форму
  async function loadExistingBooking() {
    const { data: booking, error } = await supabase
      .from('bookings')
      .select('*, cars(*), clients(*), booking_extras(*)')
      .eq('id', existingBookingId)
      .single();

    if (error || !booking) {
      console.error(error);
      alert('Не вдалося завантажити запис');
      return;
    }
    existingBooking = booking;

    document.getElementById('page-h').textContent = 'Авто приїхало за записом';
    document.getElementById('page-sub').textContent = `Запис на ${new Date(booking.scheduled_at).toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit' })} — перевірте і доповніть дані`;
    document.getElementById('submit-btn').textContent = 'Підтвердити приїзд і почати мийку';

    if (booking.clients) {
      document.getElementById('phone').value = booking.clients.phone || '';
      currentClientDiscount = booking.clients.permanent_discount_percent || 0;
      const infoBox = document.getElementById('discount-info');
      if (currentClientDiscount > 0) {
        document.getElementById('discount-percent').textContent = currentClientDiscount;
        document.getElementById('apply-discount').checked = true;
        infoBox.style.display = 'block';
      }
    }
    if (booking.cars) {
      document.getElementById('plate').value = booking.cars.plate || '';
      setBrandModelFromString(booking.cars.brand_model || '');
      document.getElementById('color').value = booking.cars.color || '';
    }
    document.getElementById('notes').value = booking.notes || '';

    if (booking.cars?.vehicle_type_id) {
      selectChipById('vtype-box', booking.cars.vehicle_type_id);
    }
    if (booking.wash_type_id) {
      selectChipById('washtype-box', booking.wash_type_id);
    }
    if (booking.booking_extras?.length) {
      booking.booking_extras.forEach(be => {
        const cb = document.querySelector(`#extras-box input[data-id="${be.extra_service_id}"]`);
        if (cb) cb.checked = true;
      });
    }
    updateTotal();
  }

  function selectChipById(containerId, id) {
    const box = document.getElementById(containerId);
    box.querySelectorAll('[data-id]').forEach(c => c.classList.remove('sel'));
    const target = box.querySelector(`[data-id="${id}"]`);
    if (target) target.classList.add('sel');
  }

  function renderChips(containerId, items, className) {
    const box = document.getElementById(containerId);
    box.innerHTML = '';
    items.forEach((item, i) => {
      const chip = document.createElement('div');
      chip.className = className + (i === 0 ? ' sel' : '');
      chip.textContent = item.name;
      chip.dataset.id = item.id;
      chip.addEventListener('click', () => {
        box.querySelectorAll('.' + className.split(' ')[0]).forEach(c => c.classList.remove('sel'));
        chip.classList.add('sel');
        updateTotal();
      });
      box.appendChild(chip);
    });
  }

  function renderExtras() {
    const box = document.getElementById('extras-box');
    box.innerHTML = '';
    if (extraServices.length === 0) {
      box.innerHTML = '<p style="font-size:12px;color:var(--text-2);padding:10px 0;">Додаткові послуги не налаштовані адміністратором</p>';
      return;
    }
    extraServices.forEach(e => {
      const row = document.createElement('label');
      row.className = 'extra-row';
      row.innerHTML = `<input type="checkbox" data-price="${e.price}" data-id="${e.id}"><span class="name">${e.name}</span><span class="price">${e.price} грн</span>`;
      row.querySelector('input').addEventListener('change', updateTotal);
      box.appendChild(row);
    });
  }

  function updateTotal() {
    const priceInput = document.getElementById('total-price');
    if (priceInput.dataset.dirty === 'true') {
      return parseFloat(priceInput.value) || 0;
    }

    const vChip = document.querySelector('#vtype-box .sel');
    const wChip = document.querySelector('#washtype-box .sel');
    if (!vChip || !wChip) return 0;

    const priceRow = washPrices.find(p => p.wash_type_id === wChip.dataset.id && p.vehicle_type_id === vChip.dataset.id);
    let total = priceRow ? Number(priceRow.price) : 0;

    document.querySelectorAll('#extras-box input:checked').forEach(cb => {
      total += Number(cb.dataset.price);
    });

    const applyDiscountEl = document.getElementById('apply-discount');
    if (currentClientDiscount > 0 && applyDiscountEl && applyDiscountEl.checked) {
      total = total * (1 - currentClientDiscount / 100);
    }
    total = Math.round(total * 100) / 100;

    priceInput.value = total;
    return total;
  }

  async function lookupClientDiscount() {
    const phone = document.getElementById('phone').value.trim();
    const infoBox = document.getElementById('discount-info');
    if (!phone) { currentClientDiscount = 0; infoBox.style.display = 'none'; updateTotal(); return; }

    const { data: client } = await supabase
      .from('clients').select('permanent_discount_percent')
      .eq('phone', phone).eq('location_id', currentStaff.location_id).maybeSingle();

    currentClientDiscount = client?.permanent_discount_percent || 0;
    if (currentClientDiscount > 0) {
      document.getElementById('discount-percent').textContent = currentClientDiscount;
      document.getElementById('apply-discount').checked = true;
      infoBox.style.display = 'block';
    } else {
      infoBox.style.display = 'none';
    }
    document.getElementById('total-price').dataset.dirty = 'false';
    updateTotal();
  }
  document.getElementById('phone').addEventListener('blur', lookupClientDiscount);
  document.getElementById('apply-discount').addEventListener('change', updateTotal);

  document.getElementById('total-price').addEventListener('input', () => {
    document.getElementById('total-price').dataset.dirty = 'true';
  });

  // Показ прев'ю фото одразу після вибору файлу
  ['front', 'back', 'left', 'right'].forEach(angle => {
    document.getElementById('photo-' + angle).addEventListener('change', (e) => {
      const file = e.target.files[0];
      const preview = document.getElementById('preview-' + angle);
      if (!file) { preview.style.display = 'none'; return; }
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';
    });
  });

  document.getElementById('checkin-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const submitBtn = document.getElementById('submit-btn');
    const frontFile = document.getElementById('photo-front').files[0];

    if (!frontFile) {
      alert('Додайте фото переду авто — це обов\'язково');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Зберігаємо...';

    const plate = document.getElementById('plate').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const brandModel = getBrandModelValue();
    const color = document.getElementById('color').value.trim();
    const notes = document.getElementById('notes').value.trim();
    const total = updateTotal();
    const vehicleTypeId = document.querySelector('#vtype-box .sel').dataset.id;
    const washTypeId = document.querySelector('#washtype-box .sel').dataset.id;

    try {
      let bookingId;

      if (existingBooking) {
        // РЕЖИМ 1: авто приїхало за вже існуючим записом — оновлюємо той самий запис,
        // а не створюємо новий (щоб не було дублів)
        bookingId = existingBooking.id;

        if (existingBooking.client_id) {
          await supabase.from('clients').update({ phone }).eq('id', existingBooking.client_id);
        }
        if (existingBooking.car_id) {
          await supabase.from('cars').update({
            plate, brand_model: brandModel, color, vehicle_type_id: vehicleTypeId
          }).eq('id', existingBooking.car_id);
        }

        const { error: updateErr } = await supabase.from('bookings').update({
          wash_type_id: washTypeId,
          status: 'in_progress',
          total_price: total,
          notes
        }).eq('id', bookingId);
        if (updateErr) throw updateErr;

        // перезаписуємо додаткові послуги (видаляємо старі, вставляємо поточний вибір)
        await supabase.from('booking_extras').delete().eq('booking_id', bookingId);
        const checkedExtras = [...document.querySelectorAll('#extras-box input:checked')];
        for (const cb of checkedExtras) {
          await supabase.from('booking_extras').insert({
            booking_id: bookingId,
            extra_service_id: cb.dataset.id,
            price: cb.dataset.price
          });
        }

      } else {
        // РЕЖИМ 2: нова реєстрація авто "з вулиці", без попереднього запису
        let clientId;
        const { data: existingClient } = await supabase
          .from('clients').select('id')
          .eq('phone', phone).eq('location_id', currentStaff.location_id)
          .maybeSingle();

        if (existingClient) {
          clientId = existingClient.id;
        } else {
          const { data: newClient, error: clientErr } = await supabase
            .from('clients').insert({ phone, location_id: currentStaff.location_id }).select().single();
          if (clientErr) throw clientErr;
          clientId = newClient.id;
        }

        const { data: car, error: carErr } = await supabase
          .from('cars').insert({
            client_id: clientId, plate, brand_model: brandModel, color,
            vehicle_type_id: vehicleTypeId
          }).select().single();
        if (carErr) throw carErr;

        const { data: booking, error: bookingErr } = await supabase
          .from('bookings').insert({
            location_id: currentStaff.location_id,
            client_id: clientId,
            car_id: car.id,
            staff_id: currentStaff.id,
            wash_type_id: washTypeId,
            scheduled_at: new Date().toISOString(),
            status: 'in_progress',
            source: 'manual',
            total_price: total,
            notes
          }).select().single();
        if (bookingErr) throw bookingErr;
        bookingId = booking.id;

        const checkedExtras = [...document.querySelectorAll('#extras-box input:checked')];
        for (const cb of checkedExtras) {
          await supabase.from('booking_extras').insert({
            booking_id: bookingId,
            extra_service_id: cb.dataset.id,
            price: cb.dataset.price
          });
        }
      }

      // Фото (перед — обов'язково, решта — якщо додані) — спільне для обох режимів
      const angles = [
        { key: 'front', input: document.getElementById('photo-front') },
        { key: 'back', input: document.getElementById('photo-back') },
        { key: 'left', input: document.getElementById('photo-left') },
        { key: 'right', input: document.getElementById('photo-right') }
      ];
      for (const angle of angles) {
        const file = angle.input.files[0];
        if (!file) continue;
        const path = `${bookingId}/${angle.key}-${Date.now()}.jpg`;
        const { error: uploadErr } = await supabase.storage.from('wash-photos').upload(path, file);
        if (uploadErr) { console.error(uploadErr); continue; }
        await supabase.from('wash_photos').insert({ booking_id: bookingId, angle: angle.key, storage_path: path });
      }

      alert('Мийку розпочато');
      window.location.href = 'index.html';

    } catch (err) {
      console.error(err);
      alert('Помилка збереження. Перевірте дані та спробуйте ще раз.');
      submitBtn.disabled = false;
      submitBtn.textContent = existingBooking ? 'Підтвердити приїзд і почати мийку' : 'Зареєструвати та почати мийку';
    }
  });
</script>
</body>
</html>
