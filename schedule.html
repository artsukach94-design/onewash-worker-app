<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Wash — Мій графік</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="shell">

  <div id="login-view" style="display:none;">
    <div class="login-box">
      <h1>One Wash</h1>
      <p>Вхід для мийників</p>
      <form id="login-form">
        <div class="form-group"><label>Email</label><input type="email" id="login-email" required></div>
        <div class="form-group"><label>Пароль</label><input type="password" id="login-password" required></div>
        <button type="submit" class="submit-btn">Увійти</button>
        <div class="login-error" id="login-error"></div>
      </form>
    </div>
  </div>

  <div id="app-view" style="display:none;">
    <div class="topbar">
      <div class="topbar-row">
        <div class="who">
          <div class="avatar" id="staff-initials">--</div>
          <div><b id="staff-name">—</b><span>Мийник · One Wash</span></div>
        </div>
        <button class="logout-btn" id="logout-btn">Вийти</button>
      </div>
    </div>

    <div class="content">
      <div class="page-h">Мій графік</div>
      <div class="page-sub">Графік встановлює адміністратор мийки</div>

      <div class="job-card" id="schedule-box"></div>
    </div>
  </div>

  <div class="bottom-nav">
    <a class="bn-item" href="index.html"><span class="ic">◧</span>Сьогодні</a>
    <a class="bn-item" href="checkin.html"><span class="ic">＋</span>Реєстрація</a>
    <a class="bn-item" href="calendar.html"><span class="ic">▦</span>Календар</a>
    <a class="bn-item active" href="schedule.html"><span class="ic">📅</span>Мій графік</a>
  </div>

</div>

<script type="module">
  import { supabase, initPage, wireLoginForm, logout } from './app.js';

  wireLoginForm();
  document.getElementById('logout-btn').addEventListener('click', logout);

  const weekdayNames = ['Понеділок', 'Вівторок', 'Середа', 'Четвер', "П'ятниця", 'Субота', 'Неділя'];

  initPage(async (staff) => {
    await loadSchedule(staff);
  });

  async function loadSchedule(staff) {
    const box = document.getElementById('schedule-box');

    const { data: schedule, error } = await supabase
      .from('staff_schedule')
      .select('*')
      .eq('staff_id', staff.id)
      .order('weekday');

    if (error) { console.error(error); box.innerHTML = '<p>Помилка завантаження графіка</p>'; return; }

    box.innerHTML = '';
    for (let i = 0; i < 7; i++) {
      const row = schedule.find(s => s.weekday === i);
      const isWorking = row ? row.is_working : false;
      const div = document.createElement('div');
      div.className = 'sched-day';
      div.innerHTML = `<div class="d">${weekdayNames[i]}</div>
                        <span class="${isWorking ? 'sched-on' : 'sched-off'}">${isWorking ? 'Робочий день' : 'Вихідний'}</span>`;
      box.appendChild(div);
    }
  }
</script>
</body>
</html>
