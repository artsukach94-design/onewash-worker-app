<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Wash — Календар</title>
<link rel="icon" type="image/png" href="icon-v2-192.png">
<link rel="apple-touch-icon" href="icon-v2-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="One Wash">
<meta name="theme-color" content="#0A1E30">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="shell">

  <div id="login-view" style="display:none;">
    <div class="login-box">
      <h1>One Wash</h1>
      <p>Вхід для мийників</p>
      <form id="login-form">
        <div class="form-group"><label>Email</label><input type="email" id="login-email" required></div>
        <div class="form-group"><label>Пароль</label><input type="password" id="login-password" required></div>
        <button type="submit" class="submit-btn">Увійти</button>
        <div class="login-error" id="login-error"></div>
      </form>
    </div>
  </div>

  <div id="app-view" style="display:none;">
    <div class="topbar">
      <div class="topbar-row">
        <div class="who">
          <div class="avatar" id="staff-initials">--</div>
          <div><b id="staff-name">—</b><span>Мийник · One Wash</span></div>
        </div>
        <button class="logout-btn" id="logout-btn">Вийти</button>
      </div>
    </div>

    <div class="content">
      <div class="page-h">Календар записів</div>
      <div class="page-sub">Лише перегляд ваших записів</div>

      <div class="day-strip" id="day-strip"></div>

      <div class="job-card" id="day-bookings" style="padding:4px 14px;"></div>
      <p class="note-small">Записувати чи скасовувати може лише адміністратор</p>
    </div>
  </div>

  <div class="bottom-nav">
    <a class="bn-item" href="index.html"><span class="ic">◧</span>Сьогодні</a>
    <a class="bn-item" href="checkin.html"><span class="ic">＋</span>Реєстрація</a>
    <a class="bn-item active" href="calendar.html"><span class="ic">▦</span>Календар</a>
    <a class="bn-item" href="schedule.html"><span class="ic">📅</span>Мій графік</a>
  </div>

</div>

<script type="module">
  import { supabase, initPage, wireLoginForm, logout, formatTime, formatDayShort, subscribeToTable } from './app.js';

  wireLoginForm();
  document.getElementById('logout-btn').addEventListener('click', logout);

  let currentStaff = null;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  let selectedDate = new Date(today);

  initPage(async (staff) => {
    currentStaff = staff;
    renderDayStrip();
    await loadDay(selectedDate);

    // Realtime: якщо запис цього мийника зміниться (адмін підтвердить, скасує тощо) —
    // відкритий день сам оновиться
    subscribeToTable('bookings-calendar-' + staff.id, 'bookings', `staff_id=eq.${staff.id}`, () => {
      loadDay(selectedDate);
    });
  });

  function renderDayStrip() {
    const strip = document.getElementById('day-strip');
    strip.innerHTML = '';
    // тиждень: 3 дні до сьогодні + сьогодні + 3 дні після
    for (let i = -3; i <= 3; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() + i);
      const chip = document.createElement('div');
      chip.className = 'day-chip' + (i === 0 ? ' sel' : '');
      chip.innerHTML = `${formatDayShort(d)}<b>${d.getDate()}</b>`;
      chip.addEventListener('click', () => {
        strip.querySelectorAll('.day-chip').forEach(c => c.classList.remove('sel'));
        chip.classList.add('sel');
        selectedDate = d;
        loadDay(d);
      });
      strip.appendChild(chip);
    }
  }

  async function loadDay(date) {
    const box = document.getElementById('day-bookings');
    box.innerHTML = '<p style="font-size:12.5px;color:var(--text-2);padding:10px 0;">Завантаження...</p>';

    const start = new Date(date); start.setHours(0, 0, 0, 0);
    const end = new Date(date); end.setHours(23, 59, 59, 999);

    const { data: bookings, error } = await supabase
      .from('bookings')
      .select('*, cars(*), clients(*), wash_types(*)')
      .eq('staff_id', currentStaff.id)
      .gte('scheduled_at', start.toISOString())
      .lte('scheduled_at', end.toISOString())
      .not('status', 'in', '(cancelled,no_show)')
      .order('scheduled_at');

    if (error) { console.error(error); box.innerHTML = '<p>Помилка завантаження</p>'; return; }

    if (bookings.length === 0) {
      box.innerHTML = '<div class="slot-row"><div class="slot-body slot-empty">Записів немає</div></div>';
      return;
    }

    box.innerHTML = '';
    bookings.forEach(b => {
      const row = document.createElement('div');
      row.className = 'slot-row';
      const carLabel = b.cars ? `${b.cars.brand_model || ''} · ${b.wash_types?.name || ''}` : (b.wash_types?.name || '');
      const clientLabel = b.clients?.full_name || b.clients?.phone || '';
      row.innerHTML = `<span class="slot-time">${formatTime(b.scheduled_at)}</span>
                        <div class="slot-body"><b>${carLabel}</b><span>${clientLabel}</span></div>`;
      box.appendChild(row);
    });
  }
</script>
</body>
</html>
