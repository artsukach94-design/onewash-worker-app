<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оплата успішна — Mage Wash</title>
<style>
  body{margin:0;background:#F3F6F9;color:#16232F;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
  .card{background:#fff;border:1px solid #E2E8F0;border-radius:20px;padding:40px 28px;text-align:center;max-width:360px;}
  .ic{width:64px;height:64px;border-radius:50%;background:#E4F5EB;color:#2F9E62;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 18px;}
  h1{font-size:18px;margin:0 0 8px;}
  p{font-size:13.5px;color:#5B6B7C;line-height:1.5;}
</style>
</head>
<body>
  <div class="card">
    <div class="ic">✓</div>
    <h1>Оплату прийнято</h1>
    <p>Дякуємо! Ваш запис підтверджено. Статус оплати з'явиться в системі мийки протягом кількох секунд.</p>
  </div>
</body>
</html>
